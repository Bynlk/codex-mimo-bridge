<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Mimo Bridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0c;--surface:#111114;--surface-2:#18181c;--surface-3:#1e1e24;
  --border:#25252e;--border-focus:#3a3a4a;
  --text:#e4e4e8;--text-dim:#8a8a96;--text-muted:#55555f;
  --accent:#8b5cf6;--accent-dim:#7c3aed;--accent-glow:rgba(139,92,246,.15);
  --green:#22c55e;--green-dim:#16a34a;--red:#ef4444;--red-dim:#dc2626;--amber:#f59e0b;
  --font-ui:'IBM Plex Sans',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono','Menlo',monospace;
  --radius:6px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:13px;-webkit-font-smoothing:antialiased}

/* === LAYOUT === */
.app{display:grid;grid-template-rows:42px 1fr 32px;height:100vh}

/* === TITLEBAR === */
.titlebar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;background:var(--surface);border-bottom:1px solid var(--border);
  -webkit-app-region:drag;user-select:none;
}
.titlebar-left{display:flex;align-items:center;gap:10px}
.logo{
  width:22px;height:22px;border-radius:5px;
  background:linear-gradient(135deg,var(--accent),#a78bfa);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 12px rgba(139,92,246,.25);
}
.logo svg{width:12px;height:12px}
.app-name{font-size:12px;font-weight:600;letter-spacing:.3px;color:var(--text)}
.app-tag{
  font-size:10px;font-weight:500;color:var(--accent);
  background:var(--accent-glow);padding:1px 6px;border-radius:3px;
  letter-spacing:.4px;text-transform:uppercase;
}
.titlebar-right{display:flex;gap:2px;-webkit-app-region:no-drag}
.titlebar-btn{
  width:28px;height:24px;border:none;background:transparent;
  color:var(--text-muted);cursor:pointer;border-radius:3px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.titlebar-btn:hover{background:var(--surface-2);color:var(--text-dim)}
.titlebar-btn.close:hover{background:var(--red);color:#fff}

/* === MAIN === */
.main{display:grid;grid-template-columns:300px 1fr;overflow:hidden}

/* === SIDEBAR === */
.sidebar{
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;padding:16px 14px;gap:20px;
}
.section-label{
  font-size:10px;font-weight:600;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;
}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:5px;font-weight:500}
.input-wrap{position:relative}
.input-wrap input{
  width:100%;height:34px;padding:0 10px;padding-right:36px;
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text);font-family:var(--font-mono);font-size:12px;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.input-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
.input-wrap input::placeholder{color:var(--text-muted)}
.input-wrap .toggle-eye{
  position:absolute;right:2px;top:50%;transform:translateY(-50%);
  width:30px;height:30px;border:none;background:transparent;
  color:var(--text-muted);cursor:pointer;border-radius:4px;
  display:flex;align-items:center;justify-content:center;transition:color .15s;
}
.input-wrap .toggle-eye:hover{color:var(--text-dim)}

/* === PROXY CONTROL === */
.proxy-section{padding:16px 14px;border-top:1px solid var(--border)}
.proxy-toggle{
  width:100%;height:42px;border:none;border-radius:var(--radius);
  font-family:var(--font-ui);font-size:12px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;letter-spacing:.3px;text-transform:uppercase;
}
.proxy-toggle.off{
  background:var(--accent);color:#fff;
  box-shadow:0 0 20px rgba(139,92,246,.2),inset 0 1px 0 rgba(255,255,255,.1);
}
.proxy-toggle.off:hover{background:var(--accent-dim);box-shadow:0 0 28px rgba(139,92,246,.3)}
.proxy-toggle.on{
  background:var(--surface-2);color:var(--red);border:1px solid var(--red-dim);
}
.proxy-toggle.on:hover{background:rgba(239,68,68,.08)}
.status-dot{
  width:7px;height:7px;border-radius:50%;display:inline-block;
}
.status-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.off{background:var(--text-muted)}

/* === LOG PANEL === */
.log-panel{display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.log-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:36px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.log-header-left{display:flex;align-items:center;gap:8px}
.log-title{font-size:11px;font-weight:600;color:var(--text-dim);letter-spacing:.5px;text-transform:uppercase}
.log-count{
  font-size:10px;color:var(--text-muted);font-family:var(--font-mono);
  background:var(--surface-2);padding:1px 6px;border-radius:3px;
}
.log-header-right{display:flex;gap:4px}
.log-btn{
  height:24px;padding:0 8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-dim);font-size:10px;
  font-family:var(--font-ui);border-radius:4px;cursor:pointer;
  transition:all .15s;font-weight:500;
}
.log-btn:hover{border-color:var(--border-focus);color:var(--text)}

.log-area{
  flex:1;overflow-y:auto;padding:10px 16px;
  font-family:var(--font-mono);font-size:11.5px;line-height:1.7;
  scrollbar-width:thin;scrollbar-color:var(--surface-3) transparent;
}
.log-area::-webkit-scrollbar{width:5px}
.log-area::-webkit-scrollbar-track{background:transparent}
.log-area::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:3px}

.log-line{display:flex;gap:0;white-space:nowrap}
.log-ts{color:var(--text-muted);min-width:75px;flex-shrink:0}
.log-level{min-width:46px;flex-shrink:0;font-weight:500}
.log-level.info{color:var(--text-dim)}
.log-level.warn{color:var(--amber)}
.log-level.error{color:var(--red)}
.log-msg{color:var(--text-dim);overflow:hidden;text-overflow:ellipsis}
.log-meta{color:var(--text-muted);margin-left:6px}
.log-status-ok{color:var(--green)}
.log-status-err{color:var(--red)}
.log-empty{
  display:flex;align-items:center;justify-content:center;
  height:100%;color:var(--text-muted);font-size:12px;
  font-family:var(--font-ui);flex-direction:column;gap:8px;
}
.log-empty svg{opacity:.3}

/* === STATUSBAR === */
.statusbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;background:var(--surface);border-top:1px solid var(--border);
  font-size:10.5px;color:var(--text-muted);font-family:var(--font-mono);
  letter-spacing:.2px;
}
.statusbar-left,.statusbar-right{display:flex;align-items:center;gap:14px}
.statusbar-item{display:flex;align-items:center;gap:4px}
.statusbar-dot{
  width:5px;height:5px;border-radius:50%;
}
.statusbar-dot.on{background:var(--green)}
.statusbar-dot.off{background:var(--text-muted)}
.statusbar-dot.error{background:var(--red)}
.statusbar-sep{width:1px;height:14px;background:var(--border)}

/* === ANIMATIONS === */
@keyframes fade-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fade-in .3s ease-out}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 0 6px var(--green)}
  50%{box-shadow:0 0 12px var(--green),0 0 20px rgba(34,197,94,.15)}
}
.pulse-glow{animation:pulse-glow 2s ease-in-out infinite}
@keyframes log-enter{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:translateX(0)}}
.log-line{animation:log-enter .15s ease-out}

/* === TOAST === */
.toast{
  position:fixed;top:52px;right:16px;z-index:100;
  padding:8px 14px;border-radius:var(--radius);
  font-size:12px;font-weight:500;
  transform:translateX(120%);transition:transform .3s ease;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
}
.toast.show{transform:translateX(0)}
.toast.success{background:var(--green-dim);color:#fff}
.toast.error{background:var(--red-dim);color:#fff}
</style>
</head>
<body>
<div class="app">
  <!-- TITLEBAR -->
  <div class="titlebar">
    <div class="titlebar-left">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </div>
      <span class="app-name">Codex Mimo Bridge</span>
      <span class="app-tag">v1.0</span>
    </div>
    <div class="titlebar-right">
      <button class="titlebar-btn" title="最小化" onclick="minimizeWindow()">
        <svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" fill="currentColor"/></svg>
      </button>
      <button class="titlebar-btn close" title="关闭" onclick="closeWindow()">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 1l8 8M9 1l-8 8"/></svg>
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div>
        <div class="section-label">连接配置</div>
        <div class="field">
          <label>API 基础地址</label>
          <div class="input-wrap">
            <input type="text" id="baseUrl" value="https://token-plan-sgp.xiaomimimo.com/v1" spellcheck="false">
          </div>
        </div>
        <div class="field">
          <label>API 密钥</label>
          <div class="input-wrap">
            <input type="password" id="apiKey" placeholder="tp-xxxxxxxxxxxx" spellcheck="false">
            <button class="toggle-eye" onclick="toggleEye()" title="显示/隐藏">
              <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div>
        <div class="section-label">代理控制</div>
        <button class="proxy-toggle off" id="proxyBtn" onclick="toggleProxy()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          启动代理
        </button>
      </div>

      <div style="margin-top:auto">
        <div class="section-label">快速测试</div>
        <button class="log-btn" style="width:100%;height:32px" onclick="testConnection()">测试连接</button>
      </div>
    </div>

    <!-- LOG PANEL -->
    <div class="log-panel">
      <div class="log-header">
        <div class="log-header-left">
          <span class="log-title">代理日志</span>
          <span class="log-count" id="logCount">0</span>
        </div>
        <div class="log-header-right">
          <button class="log-btn" onclick="clearLogs()">清空</button>
        </div>
      </div>
      <div class="log-area" id="logArea">
        <div class="log-empty" id="logEmpty">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 17 10 11 4 4"/><line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
          <span>启动代理以查看日志</span>
        </div>
      </div>
    </div>
  </div>

  <!-- STATUSBAR -->
  <div class="statusbar">
    <div class="statusbar-left">
      <div class="statusbar-item">
        <span class="statusbar-dot off" id="statusDot"></span>
        <span id="statusText">已停止</span>
      </div>
      <div class="statusbar-sep"></div>
      <div class="statusbar-item">端口 <span id="portDisplay">8742</span></div>
      <div class="statusbar-sep"></div>
      <div class="statusbar-item">请求 <span id="reqCount">0</span></div>
    </div>
    <div class="statusbar-right">
      <div class="statusbar-item" id="uptimeDisplay"></div>
      <div class="statusbar-sep"></div>
      <div class="statusbar-item">Codex Mimo Bridge</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.origin;
let proxyRunning = false;
let logEntries = [];
let uptimeInterval = null;
let startTime = null;

// === PROXY ===
async function toggleProxy() {
  const btn = document.getElementById('proxyBtn');
  if (proxyRunning) {
    await fetch(API + '/api/proxy/stop', { method: 'POST' });
  } else {
    const baseUrl = document.getElementById('baseUrl').value.trim();
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!baseUrl || !apiKey) { showToast('请填写基础地址和 API 密钥', 'error'); return; }
    const res = await fetch(API + '/api/proxy/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ baseUrl, apiKey })
    });
    const data = await res.json();
    if (!data.ok) { showToast(data.error || '启动失败', 'error'); return; }
  }
}

async function pollStatus() {
  try {
    const res = await fetch(API + '/api/proxy/status');
    const data = await res.json();
    updateUI(data);
  } catch(e) {}
}

function updateUI(status) {
  const wasRunning = proxyRunning;
  proxyRunning = status.running;
  const btn = document.getElementById('proxyBtn');
  const dot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const reqCount = document.getElementById('reqCount');
  const uptimeEl = document.getElementById('uptimeDisplay');

  if (proxyRunning) {
    btn.className = 'proxy-toggle on';
    btn.innerHTML = '<span class="status-dot on pulse-glow"></span> 停止代理';
    dot.className = 'statusbar-dot on';
    statusText.textContent = '运行中';
    if (!wasRunning) startTime = Date.now();
    if (!uptimeInterval) uptimeInterval = setInterval(updateUptime, 1000);
  } else {
    btn.className = 'proxy-toggle off';
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> 启动代理';
    dot.className = 'statusbar-dot off';
    statusText.textContent = '已停止';
    uptimeEl.textContent = '';
    if (uptimeInterval) { clearInterval(uptimeInterval); uptimeInterval = null; }
    startTime = null;
  }
  reqCount.textContent = status.requestCount || 0;
}

function updateUptime() {
  if (!startTime) return;
  const s = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(s / 60), h = Math.floor(m / 60);
  const ss = String(s % 60).padStart(2, '0'), mm = String(m % 60).padStart(2, '0');
  document.getElementById('uptimeDisplay').textContent = h > 0 ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
}

// === LOGS ===
async function pollLogs() {
  try {
    const res = await fetch(API + '/api/logs');
    const data = await res.json();
    if (data.logs && data.logs.length > logEntries.length) {
      const newLogs = data.logs.slice(logEntries.length);
      logEntries = data.logs;
      const area = document.getElementById('logArea');
      const empty = document.getElementById('logEmpty');
      if (empty) empty.remove();
      newLogs.forEach(entry => appendLogLine(area, entry));
      area.scrollTop = area.scrollHeight;
      document.getElementById('logCount').textContent = logEntries.length;
    }
  } catch(e) {}
}

function appendLogLine(container, entry) {
  const div = document.createElement('div');
  div.className = 'log-line';
  const ts = new Date(entry.ts).toLocaleTimeString('en-GB');
  const level = entry.level || 'info';
  let meta = '';
  if (entry.method) {
    meta = `${entry.method} ${entry.url || ''}`;
    if (entry.status) meta += ` <span class="${entry.status < 400 ? 'log-status-ok' : 'log-status-err'}">${entry.status}</span>`;
    if (entry.durationMs) meta += ` <span class="log-status-ok">${entry.durationMs}ms</span>`;
  }
  div.innerHTML = `<span class="log-ts">${ts}</span><span class="log-level ${level}">[${level}]</span><span class="log-msg">${escHtml(entry.msg)}</span>${meta ? '<span class="log-meta">' + meta + '</span>' : ''}`;
  container.appendChild(div);
}

function clearLogs() {
  logEntries = [];
  const area = document.getElementById('logArea');
  area.innerHTML = '<div class="log-empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 4"/><line x1="12" y1="19" x2="20" y2="19"/></svg><span>启动代理以查看日志</span></div>';
  document.getElementById('logCount').textContent = '0';
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// === TEST ===
async function testConnection() {
  const baseUrl = document.getElementById('baseUrl').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!baseUrl || !apiKey) { showToast('请填写基础地址和 API 密钥', 'error'); return; }
  showToast('正在测试连接...', 'success');
  try {
    const res = await fetch(API + '/api/test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ baseUrl, apiKey })
    });
    const data = await res.json();
    if (data.ok) {
      showToast(`连接成功！${data.models?.length || 0} 个模型（${data.latencyMs}ms）`, 'success');
    } else {
      showToast(data.error || '连接失败', 'error');
    }
  } catch(e) {
    showToast('网络错误', 'error');
  }
}

// === TOAST ===
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => el.classList.remove('show'), 3000);
}

// === EYE TOGGLE ===
function toggleEye() {
  const inp = document.getElementById('apiKey');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// === WINDOW CONTROLS ===
function minimizeWindow() {
  fetch(API + '/api/window/minimize', { method: 'POST' }).catch(() => {});
}
function closeWindow() {
  fetch(API + '/api/window/close', { method: 'POST' }).catch(() => {});
}

// === INIT ===
pollStatus();
setInterval(pollStatus, 2000);
setInterval(pollLogs, 1000);
</script>
</body>
</html>
